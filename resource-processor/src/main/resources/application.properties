spring.application.name=resource-processor
server.port=${SERVER_PORT:8085}

spring.kafka.bootstrap-servers=${KAFKA_URL:kafka:9092}
kafka.topic.resource-processed=resource-processed
spring.kafka.consumer.group-id=resource-processor-group

resource-service.url=${RESOURCE_SERVICE_NAME:localhost}
resource-service.port=${RESOURCE_SERVICE_PORT:8081}

song-service.url=${SONG_SERVICE_NAME:localhost}
song-service.port=${SONG_SERVICE_PORT:8082}

eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761}/eureka
eureka.instance.prefer-ip-address=true
spring.cloud.service-registry.auto-registration.enabled=true
eureka.client.enabled=true
eureka.client.register-with-eureka=true

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# JVM Metrics
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# Custom Application Metrics
management.metrics.enable.http=true
management.metrics.enable.kafka=true

# OAuth2 Client Configuration for service-to-service communication
spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID:resource-processor-service}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:resource-processor-secret}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.keycloak.scope=openid

spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/microservices}
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_TOKEN_URI:http://localhost:8080/realms/microservices/protocol/openid-connect/token}

logging.level.com.learn=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.client=DEBUG