spring.application.name=api-gateway
server.port=${SERVER_PORT:8080}

# Spring Cloud Gateway Configuration
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# WebFlux HTTP Client Configuration
spring.cloud.gateway.server.webflux.httpclient.connect-timeout=3000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=5s

# Gateway Routes Configuration
# Song Service Route
spring.cloud.gateway.server.webflux.routes[0].id=song-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://song-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/songs/**
spring.cloud.gateway.server.webflux.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.name=songServiceCircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.fallbackUri=forward:/fallback/songs

# Resource Service Route
spring.cloud.gateway.server.webflux.routes[1].id=resource-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://resource-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/resources/**
spring.cloud.gateway.server.webflux.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.name=resourceServiceCircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.fallbackUri=forward:/fallback/resources

# Resource Processor Route
spring.cloud.gateway.server.webflux.routes[2].id=resource-processor
spring.cloud.gateway.server.webflux.routes[2].uri=lb://resource-processor
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/metadata/**
spring.cloud.gateway.server.webflux.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.name=resourceProcessorCircuitBreaker
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.fallbackUri=forward:/fallback/metadata

# Catch-all Route (must come last)
spring.cloud.gateway.server.webflux.routes[3].id=catch-all
spring.cloud.gateway.server.webflux.routes[3].uri=forward:/fallback
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/**

# Default Filters
spring.cloud.gateway.default-filters[0]=AddRequestHeader=X-Request-Id, ${random.uuid}

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761}/eureka
#eureka.instance.prefer-ip-address=true
spring.cloud.service-registry.auto-registration.enabled=true
eureka.client.enabled=true
eureka.client.serviceUrl.registerWithEureka=true
eureka.client.fetch-registry=true
# eureka.client.register-with-eureka=true

# Management Endpoints Configuration
management.endpoints.web.exposure.include=health,info,gateway,metrics,env
management.endpoint.health.show-details=when_authorized
