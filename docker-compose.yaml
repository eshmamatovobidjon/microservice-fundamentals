version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-net
    depends_on:
      - zookeeper

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: "eureka-server"
    networks:
      - microservices-net

  resource-db:
    image: postgres:${POSTGRES_VERSION}
    container_name: resource-db
    environment:
      POSTGRES_DB: ${RESOURCE_DB}
      POSTGRES_USER: ${RESOURCE_DB_USER}
      POSTGRES_PASSWORD: ${RESOURCE_DB_PASSWORD}
    ports:
      - "${RESOURCE_DB_PORT}:5432"
    volumes:
      - ./init-scripts/resource-db:/docker-entrypoint-initdb.d
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${RESOURCE_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  song-db:
    image: postgres:${POSTGRES_VERSION}
    container_name: song-db
    environment:
      POSTGRES_DB: ${SONG_DB}
      POSTGRES_USER: ${SONG_DB_USER}
      POSTGRES_PASSWORD: ${SONG_DB_PASSWORD}
    ports:
      - "${SONG_DB_PORT}:5432"
    volumes:
      - ./init-scripts/song-db:/docker-entrypoint-initdb.d
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SONG_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  resource-service:
    build:
      context: ./resource-service
      dockerfile: Dockerfile
    container_name: resource-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "${RESOURCE_DB_URL}"
      SPRING_DATASOURCE_USERNAME: "${RESOURCE_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${RESOURCE_DB_PASSWORD}"
      SONG_SERVICE_NAME: "song-service"
      SONG_SERVICE_PORT: "8082"
      EUREKA_URI: "eureka-server"
      KAFKA_URL: "kafka:9092"
    depends_on:
      resource-db:
        condition: service_healthy
      resource-processor:
        condition: service_started
      song-service:
        condition: service_started
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net

  resource-processor:
    build:
      context: ./resource-processor
      dockerfile: Dockerfile
    container_name: resource-processor
    ports:
      - "8085:8085"
    environment:
      RESOURCE_SERVICE_NAME: "resource-service"
      RESOURCE_SERVICE_PORT: "8081"
      SONG_SERVICE_NAME: "song-service"
      SONG_SERVICE_PORT: "8082"
      EUREKA_URI: "eureka-server"
      KAFKA_URL: "kafka:9092"
    depends_on:
      song-service:
        condition: service_started
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net

  song-service:
    build:
      context: ./song-service
      dockerfile: Dockerfile
    deploy:
      replicas: 1
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: "${SONG_DB_URL}"
      SPRING_DATASOURCE_USERNAME: "${SONG_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${SONG_DB_PASSWORD}"
      EUREKA_URI: "eureka-server"
    depends_on:
      song-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
