version: '3.8'
services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: [ "CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/8080' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  keycloak-db:
    image: postgres:16
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5436:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - microservices-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=microservices-logs
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - microservices-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - microservices-net

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - microservices-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - microservices-net

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: filebeat
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - resource-processor-logs:/usr/share/filebeat/logs/resource-processor:ro
      - resource-service-logs:/usr/share/filebeat/logs/resource-service:ro
      - song-service-logs:/usr/share/filebeat/logs/song-service:ro
      - storage-service-logs:/usr/share/filebeat/logs/storage-service:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - microservices-net

  eureka-server:
    container_name: eureka-server
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8280:8280"
    environment:
      SERVER_PORT: 8280
      EUREKA_URL: http://eureka-server:8761
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/microservices
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/certs
    depends_on:
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - microservices-net

  resource-db:
    image: postgres:${POSTGRES_VERSION}
    container_name: resource-db
    environment:
      POSTGRES_DB: ${RESOURCE_DB}
      POSTGRES_USER: ${RESOURCE_DB_USER}
      POSTGRES_PASSWORD: ${RESOURCE_DB_PASSWORD}
    ports:
      - "${RESOURCE_DB_PORT}:5432"
    volumes:
      - ./init-scripts/resource-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${RESOURCE_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

  song-db:
    image: postgres:${POSTGRES_VERSION}
    container_name: song-db
    environment:
      POSTGRES_DB: ${SONG_DB}
      POSTGRES_USER: ${SONG_DB_USER}
      POSTGRES_PASSWORD: ${SONG_DB_PASSWORD}
    ports:
      - "${SONG_DB_PORT}:5432"
    volumes:
      - ./init-scripts/song-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SONG_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

  storage-db:
    image: postgres:${POSTGRES_VERSION}
    container_name: storage-db
    environment:
      POSTGRES_DB: ${STORAGE_DB}
      POSTGRES_USER: ${STORAGE_DB_USER}
      POSTGRES_PASSWORD: ${STORAGE_DB_PASSWORD}
    ports:
      - "${STORAGE_DB_PORT}:5432"
    volumes:
      - ./init-scripts/storage-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${STORAGE_DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices-net

  resource-service:
    build:
      context: ./resource-service
      dockerfile: Dockerfile
    container_name: resource-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: "${RESOURCE_DB_URL}"
      SPRING_DATASOURCE_USERNAME: "${RESOURCE_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${RESOURCE_DB_PASSWORD}"
      SONG_SERVICE_NAME: "api-gateway"
      SONG_SERVICE_PORT: "8280"
      STORAGE_SERVICE_NAME: "api-gateway"
      STORAGE_SERVICE_PORT: "8280"
      EUREKA_URL: http://eureka-server:8761
      KAFKA_URL: "kafka:9092"
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/microservices
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/certs
    volumes:
      - resource-service-logs:/app/logs
    depends_on:
      resource-db:
        condition: service_healthy
      resource-processor:
        condition: service_started
      song-service:
        condition: service_started
      eureka-server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - microservices-net

  resource-processor:
    build:
      context: ./resource-processor
      dockerfile: Dockerfile
    container_name: resource-processor
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      RESOURCE_SERVICE_NAME: "api-gateway"
      RESOURCE_SERVICE_PORT: "8280"
      SONG_SERVICE_NAME: "api-gateway"
      SONG_SERVICE_PORT: "8280"
      EUREKA_URL: http://eureka-server:8761
      KAFKA_URL: "kafka:9092"
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/microservices
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/certs
      # Service account credentials for machine-to-machine communication
      KEYCLOAK_CLIENT_ID: resource-processor-service
      KEYCLOAK_CLIENT_SECRET: dMLb6d8q4cpfiN64Fpb4gBrsjqNh6224
      KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/token
    volumes:
      - resource-processor-logs:/app/logs
    depends_on:
      song-service:
        condition: service_started
      eureka-server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - microservices-net

  song-service:
    build:
      context: ./song-service
      dockerfile: Dockerfile
    container_name: song-service
    deploy:
      replicas: 1
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: "${SONG_DB_URL}"
      SPRING_DATASOURCE_USERNAME: "${SONG_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${SONG_DB_PASSWORD}"
      EUREKA_URL: http://eureka-server:8761
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/microservices
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/certs
    volumes:
      - song-service-logs:/app/logs
    depends_on:
      song-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - microservices-net

  storage-service:
    build:
      context: ./storage-service
      dockerfile: Dockerfile
    container_name: storage-service
    deploy:
      replicas: 1
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: "${STORAGE_DB_URL}"
      SPRING_DATASOURCE_USERNAME: "${STORAGE_DB_USER}"
      SPRING_DATASOURCE_PASSWORD: "${STORAGE_DB_PASSWORD}"
      EUREKA_URL: http://eureka-server:8761
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/microservices
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/microservices/protocol/openid-connect/certs
    volumes:
      - storage-service-logs:/app/logs
    depends_on:
      storage-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - microservices-net

volumes:
  elasticsearch-data:
    driver: local
  keycloak-db-data:
    driver: local
  resource-processor-logs:
    driver: local
  resource-service-logs:
    driver: local
  song-service-logs:
    driver: local
  storage-service-logs:
    driver: local

networks:
  microservices-net:
    driver: bridge