spring.application.name=resource-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/resource_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}


AWS_REGION=eu-central-1

spring.kafka.bootstrap-servers=${KAFKA_URL:localhost:9092}
kafka.topic.resource-created=resource-created
kafka.topic.resource-processed=resource-processed
spring.kafka.consumer.group-id=resource-service-group

song-service.url=${SONG_SERVICE_NAME:localhost}
song-service.port=${SONG_SERVICE_PORT:8082}

storage-service.url=${STORAGE_SERVICE_NAME:localhost}
storage-service.port=${STORAGE_SERVICE_PORT:8086}

eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761}/eureka
eureka.instance.prefer-ip-address=true
spring.cloud.service-registry.auto-registration.enabled=true
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# JVM Metrics
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# Custom Application Metrics
management.metrics.enable.http=true
management.metrics.enable.kafka=true

# OAuth2 Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/microservices}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/microservices/protocol/openid-connect/certs}

# OAuth2 Client Configuration for service-to-service communication
spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID:resource-service}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:resource-service-secret}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.keycloak.scope=openid

spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/microservices}
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/microservices}/protocol/openid-connect/token

logging.level.com.learn=INFO
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.security=DEBUG